name: Sync lotto data

on:
  schedule:
    # 매주 일요일 02:00 UTC = 일요일 11:00 KST (토요일 밤 추첨 + 안전 마진)
    - cron: "0 2 * * 0"
  workflow_dispatch:  # 수동 실행도 허용

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run sync script
        id: sync
        run: python scripts/sync_lotto.py

      - name: Commit updated cache
        run: |
          if git diff --quiet lotto_cache.json; then
            echo "변경사항 없음 — 커밋 건너뜀"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lotto_cache.json
          LATEST=$(python -c "import json; d=json.load(open('lotto_cache.json')); print(d[-1]['round'])")
          git commit -m "chore(data): 로또 데이터 자동 갱신 (~${LATEST}회차)"
          git push

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            const title = `[자동 sync 실패] ${new Date().toISOString().split('T')[0]}`;
            const body = [
              '로또 데이터 자동 갱신이 실패했습니다.',
              '',
              `- 워크플로우: ${context.workflow}`,
              `- 실행 ID: ${context.runId}`,
              `- 로그: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              '## 가능한 원인',
              '1. smok95/lotto 저장소가 삭제되었거나 URL이 바뀜',
              '2. 원본 JSON 스키마 변경 (필드명: draw_no / bonus_no / date / numbers)',
              '3. 검증 실패 (번호 범위·중복 등)',
              '',
              '## 대응',
              '- 단기: `index.html`의 "수동 등록" 폼으로 새 회차 직접 입력',
              '- 중기: `scripts/sync_lotto.py`의 `GITHUB_ALL_URL` 또는 `normalize()` 수정',
              '- 상세 절차: `docs/OPERATIONS.md` 참조',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['automation', 'data-sync'],
            });
